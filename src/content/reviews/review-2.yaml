author: "Elena & Radu"
text: "Domnișoară dragă, vă mulțumesc din inimă pentru portretul minunat pe care ni l-ați realizat! Ați reușit să surprindeți perfect emoția și legătura dintre noi — fiecare detaliu este plin de sensibilitate și talent. Portretul ne-a emoționat profund și va rămâne o amintire prețioasă pentru totdeauna. Vă recomand din tot sufletul!"
rating: 5
order: 2
