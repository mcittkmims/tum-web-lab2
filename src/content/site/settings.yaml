aboutParagraphs:
  - "Bună, sunt Lauriana — artista din spatele <strong>byL&L</strong>. Transform fotografiile voastre de cuplu în opere de artă unice, pictate manual. Fiecare pensulă este plină de grijă, surprinzând emoția și legătura care vă face povestea unică."
  - "Fie că este o surpriză de aniversare, un cadou de nuntă sau pur și simplu o modalitate de a celebra dragostea voastră — ar fi o onoare să creez ceva cu adevărat special pentru voi."
